<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>風一族職場教會週報 - 雲端版</title>

    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; background-color: #F2F2EE; }
        .backdrop-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        svg { overflow: visible !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sermon-content { white-space: pre-line; }
        .announcement-detail { white-space: pre-line; }

        @keyframes wave-bars {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }
        .wave-bar {
            width: 3px;
            background-color: currentColor;
            border-radius: 2px;
            animation: wave-bars 1s ease-in-out infinite;
            transform-origin: bottom;
            display: inline-block;
        }
        .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { height: 12px; animation-delay: 0.4s; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-enter { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-[#1C1C1E]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCotyhW5mvvDE9YYSz2sICwMtrFlia1Tyg",
          authDomain: "royal-chosen-race.firebaseapp.com",
          projectId: "royal-chosen-race",
          databaseURL: "https://royal-chosen-race-default-rtdb.firebaseio.com",
          storageBucket: "royal-chosen-race.firebasestorage.app",
          messagingSenderId: "505655650913",
          appId: "1:505655650913:web:9ee5735807e21faee15820"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z" />,
                music: <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />,
                users: <Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Fragment>,
                chevronDown: <path d="m6 9 6 6 6-6" />,
                church: <Fragment><path d="m18 7 4 2v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 22V5l-6-3-6 3v17"/><path d="M12 7v5"/><path d="M10 9h4"/></Fragment>,
                clock: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" /></Fragment>,
                globe: <Fragment><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1 4-10z" /></Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                message: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                pin: <Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Fragment>,
                card: <Fragment><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20" /></Fragment>,
                download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Fragment>,
                copy: <Fragment><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></Fragment>,
                share: <Fragment><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></Fragment>,
                externalLink: <Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`inline-block ${className}`}>
                    {icons[name]}
                </svg>
            );
        };

        const MultilineText = ({ text, className = "" }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className={className}>
                    {lines.map((line, i) => {
                        const isListItem = /^(\d+[\.、]|[・\-\*])(?:\s+)?/.test(line.trim());
                        return (
                            <p key={i} className={`mb-2.5 last:mb-0 min-h-[1.2em] ${isListItem ? 'pl-[1.5em] -indent-[1.5em]' : ''}`}>
                                {line}
                            </p>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [activeMainTab, setActiveMainTab] = useState('worship');
            const [activeGroupTab, setActiveGroupTab] = useState('weekday');
            const [verseOpen, setVerseOpen] = useState(false);
            const [expandedSermon, setExpandedSermon] = useState(null);
            const [expandedNews, setExpandedNews] = useState(null);
            const [data, setData] = useState(null);
            const [toast, setToast] = useState('');
            
            // 全域字體狀態
            const [fontSize, setFontSize] = useState('normal'); 

            useEffect(() => {
                const cachedData = localStorage.getItem('bulletin_data_cache');
                if (cachedData) {
                    setData(JSON.parse(cachedData));
                }

                const bulletinRef = db.ref('bulletin_data');
                bulletinRef.on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        setData(cloudData);
                        localStorage.setItem('bulletin_data_cache', JSON.stringify(cloudData));
                    }
                });
                return () => bulletinRef.off();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 10000);
                return () => clearInterval(timer);
            }, []);

            const isTimeActive = (start, end) => {
                const parseMins = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                const nowMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                return nowMins >= parseMins(start) && nowMins < parseMins(end);
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    if (navigator.vibrate) navigator.vibrate(50);
                    setToast('✅ 帳號複製成功，可以去銀行 App 貼上囉！');
                    setTimeout(() => setToast(''), 3000);
                });
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: '風一族職場教會週報',
                            text: '邀請您查看本週最新週報與聚會資訊！',
                            url: window.location.href,
                        });
                    } catch (error) {
                        console.log('分享失敗', error);
                    }
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    setToast('✅ 已複製週報連結');
                    setTimeout(() => setToast(''), 3000);
                }
            };
            
            const toggleFontSize = () => {
                setFontSize(current => current === 'normal' ? 'large' : 'normal');
            };

            const cardStyle = "bg-white border border-gray-100/80 rounded-[2rem] shadow-sm overflow-hidden transition-all duration-300";

            if (!data) {
                return (
                    <div className="w-full min-h-screen flex items-start justify-center bg-[#F2F2EE] pt-6 px-4 pb-20">
                        <div className="w-full max-w-4xl space-y-6 animate-pulse">
                            <div className="h-20 bg-gray-300/60 rounded-2xl w-full"></div>
                            <div className="h-80 bg-gray-300/60 rounded-[2rem] w-full"></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="h-64 bg-gray-300/60 rounded-[2rem]"></div>
                                <div className="h-64 bg-gray-300/60 rounded-[2rem]"></div>
                            </div>
                        </div>
                    </div>
                );
            }

            // 動態主題與色彩定義
            const themeColorClass = activeMainTab === 'worship' ? 'text-[#007AFF]' : activeMainTab === 'news' ? 'text-[#FF9500]' : 'text-[#34C759]';
            const themeBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]' : activeMainTab === 'news' ? 'bg-[#FF9500]' : 'bg-[#34C759]';
            const themeLightBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]/10' : activeMainTab === 'news' ? 'bg-[#FF9500]/10' : 'bg-[#34C759]/10';
            
            const themeScriptureBorderClass = activeMainTab === 'worship' ? 'border-[#007AFF]/40' : activeMainTab === 'news' ? 'border-[#FF9500]/40' : 'border-[#34C759]/40';
            const themeScriptureBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]/5' : activeMainTab === 'news' ? 'bg-[#FF9500]/5' : 'bg-[#34C759]/5';

            const themeGroupHoverTextClass = activeMainTab === 'worship' ? 'group-hover:text-[#007AFF]' : activeMainTab === 'news' ? 'group-hover:text-[#FF9500]' : 'group-hover:text-[#34C759]';
            const themeGroupHoverBgClass = activeMainTab === 'worship' ? 'hover:bg-[#007AFF]/5 active:bg-[#007AFF]/10' : activeMainTab === 'news' ? 'hover:bg-[#FF9500]/5 active:bg-[#FF9500]/10' : 'hover:bg-[#34C759]/5 active:bg-[#34C759]/10';

            // ======= 全域字級綁定系統 (A+ / A- 控制) =======
            const textH1 = fontSize === 'large' ? 'text-[24px] md:text-[28px]' : 'text-[20px] md:text-[24px]';
            const textH2 = fontSize === 'large' ? 'text-[32px] md:text-[40px]' : 'text-[26px] md:text-[34px]';
            const textH3 = fontSize === 'large' ? 'text-[14px]' : 'text-[12px]'; 
            
            const textLg = fontSize === 'large' ? 'text-[20px]' : 'text-[17px]'; // 小標題、人名
            const textMd = fontSize === 'large' ? 'text-[19px]' : 'text-[16px]'; // 內文主要閱讀區 (經文、大綱)
            const textSm = fontSize === 'large' ? 'text-[16px]' : 'text-[14px]'; // 輔助說明、時間
            const textXs = fontSize === 'large' ? 'text-[14px]' : 'text-[12px]'; // 小標籤
            const textMicro = fontSize === 'large' ? 'text-[13px]' : 'text-[11px]'; // 極小徽章
            
            const textHuge = fontSize === 'large' ? 'text-[28px] md:text-[32px]' : 'text-[24px] md:text-[28px]'; // 帳號、電話數字
            // ===============================================

            return (
                <div className="w-full min-h-screen flex justify-center bg-[#F2F2EE]">
                    <div className={`w-full max-w-4xl min-h-screen relative shadow-2xl hide-scrollbar pb-36 md:pb-10 transition-colors duration-700 ${
                        activeMainTab === 'worship' ? 'bg-[#F2F6FA]' : activeMainTab === 'news' ? 'bg-[#FCF6ED]' : 'bg-[#F2FAF4]'
                    }`}>

                        <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-gray-200/50 px-5 py-3 md:px-6 md:py-4">
                            {/* 頂部排版：標題與徽章 (靠左) / 動作按鈕 (靠右) */}
                            <div className="flex justify-between items-start md:items-center mb-1.5 gap-2">
                                <div className="flex flex-wrap items-center gap-2 md:gap-3 mt-1 md:mt-0">
                                    <h1 className={`${textH1} font-black tracking-tight text-[#1C1C1E] whitespace-nowrap transition-all duration-300`}>風一族職場教會</h1>
                                    {/* 統一顯示的日期與週數徽章 */}
                                    <span className={`${textMicro} font-bold px-2.5 py-0.5 rounded-full whitespace-nowrap transition-all duration-500 ${themeColorClass} ${themeLightBgClass}`}>
                                        {data.bulletinDate.slice(5)} {data.weekNumber}
                                    </span>
                                </div>
                                
                                <div className="flex gap-2 items-center shrink-0">
                                    <button type="button" onClick={toggleFontSize} className="flex items-center justify-center w-8 h-8 md:w-9 md:h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-[#48484A] font-black text-[13px] transition-colors shadow-sm" title="切換字體大小">
                                        {fontSize === 'normal' ? 'A+' : 'A-'}
                                    </button>
                                    
                                    <button type="button" onClick={handleShare} className="flex items-center gap-1.5 text-[12px] md:text-[13px] font-bold text-[#48484A] bg-gray-100 hover:bg-gray-200 px-3 py-1.5 md:py-2 rounded-full transition-colors duration-300 shadow-sm">
                                        <Icon name="share" size={14} /> <span className="hidden sm:inline">分享此週報</span>
                                    </button>
                                    
                                    {data?.pdfDownloadUrl && (
                                        <a 
                                            href={data.pdfDownloadUrl} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className={`hidden md:flex items-center justify-center w-9 h-9 rounded-full text-white transition-all duration-300 hover:scale-110 ${themeBgClass} shadow-md`}
                                            title="下載週報 PDF"
                                        >
                                            <Icon name="download" size={16} />
                                        </a>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex justify-start items-center">
                                <p className={`${textXs} text-[#6C6C70] font-medium flex items-center gap-2 transition-all duration-300`}>
                                    <span className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full transition-colors duration-500 ${themeBgClass}`}></span>
                                    2026年度異象：{data.vision}
                                </p>
                            </div>
                        </header>

                        <div className="hidden md:flex sticky top-[77px] z-30 bg-white/80 backdrop-blur-md border-b border-gray-200/50 px-6 py-3 gap-4 shadow-sm">
                            {[
                                { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                            ].map(item => (
                                <button key={item.id} type="button" onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex items-center justify-center gap-2 h-10 rounded-xl transition-all duration-300 ${
                                    activeMainTab === item.id ? `${item.activeBg} text-white shadow-md` : 'bg-white text-[#8E8E93] border border-gray-200 hover:bg-gray-50'
                                }`}>
                                    <Icon name={item.icon} size={18} />
                                    <span className="text-[14px] font-bold tracking-wide">{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="p-5 space-y-6">
                            <section>
                                <div className={`${cardStyle} p-7 md:p-10 border-none bg-gradient-to-br from-white to-[#F9F9F9] relative overflow-hidden`}>
                                    <div className="relative z-10">
                                        <div className={`flex items-center gap-2 mb-3 transition-colors duration-500 ${themeColorClass}`}>
                                            <Icon name="book" size={22} />
                                            <span className={`${textXs} font-black tracking-widest uppercase transition-all duration-300`}>信息主題</span>
                                        </div>
                                        <h2 className={`${textH2} font-black text-[#1C1C1E] mb-6 tracking-normal leading-snug transition-all duration-300`}>{data.theme.title}</h2>
                                        <div className="flex gap-6 mb-6">
                                            <div className="space-y-1"><p className={`${textXs} text-[#8E8E93] font-bold uppercase tracking-wider transition-all duration-300`}>講員</p><p className={`${textLg} font-bold text-[#1C1C1E] transition-all duration-300`}>{data.theme.speaker}</p></div>
                                            <div className="w-[1px] h-10 md:h-12 bg-gray-200"></div>
                                            <div className="space-y-1"><p className={`${textXs} text-[#8E8E93] font-bold uppercase tracking-wider transition-all duration-300`}>司會</p><p className={`${textLg} font-bold text-[#1C1C1E] transition-all duration-300`}>{data.theme.moderator}</p></div>
                                        </div>
                                        
                                        <button type="button" onClick={() => setVerseOpen(!verseOpen)} className="w-full md:w-auto md:px-8 py-3.5 bg-[#F2F2F7] rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all hover:bg-gray-200 group">
                                            <span className={`${textMd} font-bold text-[#1C1C1E] transition-all duration-300`}>本週經文</span>
                                            <span className={`${textXs} text-[#8E8E93] font-normal group-hover:text-[#1C1C1E] transition-all duration-300`}>(點擊閱讀)</span>
                                            <Icon name="chevronDown" size={16} className={`text-[#1C1C1E] transition-transform duration-300 ${verseOpen ? 'rotate-180' : ''}`} />
                                        </button>
                                        
                                        {verseOpen && 
                                            <div className={`mt-4 p-5 md:p-6 rounded-2xl border-l-4 shadow-inner text-[#444] tracking-wide leading-loose transition-all duration-300 ${themeScriptureBgClass} ${themeScriptureBorderClass} ${textMd} font-medium`}>
                                                <MultilineText text={data.theme.scripture} />
                                            </div>
                                        }
                                    </div>
                                    <div 
                                        className="absolute top-0 right-0 w-64 h-64 md:w-96 md:h-96 -mr-24 -mt-24 pointer-events-none transition-colors duration-700"
                                        style={{
                                            background: activeMainTab === 'worship' 
                                                ? 'radial-gradient(circle, rgba(0, 122, 255, 0.12) 0%, rgba(0, 122, 255, 0) 70%)' 
                                                : activeMainTab === 'news' 
                                                ? 'radial-gradient(circle, rgba(255, 149, 0, 0.12) 0%, rgba(255, 149, 0, 0) 70%)' 
                                                : 'radial-gradient(circle, rgba(52, 199, 89, 0.12) 0%, rgba(52, 199, 89, 0) 70%)'
                                        }}
                                    ></div>
                                </div>
                            </section>

                            <main>
                                {activeMainTab === 'worship' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                        
                                        <div className={`${cardStyle} p-6 md:p-8 col-span-1 md:col-span-2 lg:col-span-1 lg:row-span-2`}>
                                            <h3 className={`${textH3} font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-5 transition-all duration-300`}>信息大綱 OUTLINE</h3>
                                            <div className="space-y-4">
                                                {(data.sermonOutline || []).map((item, idx) => (
                                                    <div key={idx} className="bg-[#F2F2F7] rounded-2xl overflow-hidden border border-gray-100">
                                                        <button type="button" onClick={() => setExpandedSermon(expandedSermon === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left hover:bg-gray-200 transition-colors group">
                                                            <span className={`${textLg} font-bold text-[#1C1C1E] pr-2 leading-snug transition-all duration-300`}>{item.title}</span>
                                                            <div className="flex items-center gap-1 shrink-0 text-[#8E8E93] group-hover:text-[#1C1C1E] transition-colors">
                                                                {!expandedSermon || expandedSermon !== idx ? <span className={`${textXs} hidden sm:inline font-normal transition-all duration-300`}>(展開)</span> : null}
                                                                <Icon name="chevronDown" size={18} className={`transition-transform duration-300 ${expandedSermon === idx ? 'rotate-180' : ''}`} />
                                                            </div>
                                                        </button>
                                                        {expandedSermon === idx && (
                                                            <div className="px-5 pb-5 pt-1 border-t border-gray-200 mt-1 mx-2">
                                                                {(item.content || []).map((p, pi) => (
                                                                    <div key={pi} className={`${textMd} font-normal text-[#48484A] leading-relaxed mt-4 transition-all duration-300`}>
                                                                        <MultilineText text={p} />
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-6 col-span-1 lg:col-span-1">
                                            <div className={`${cardStyle} p-7 md:p-8`}>
                                                <h3 className={`${textH3} font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-6 transition-all duration-300`}>聚會流程 SCHEDULE</h3>
                                                <div className="space-y-6">
                                                    {(data.schedule || []).map((item, idx) => {
                                                        const active = isTimeActive(item.start, item.end);
                                                        return (
                                                            <div key={idx} className="w-full">
                                                                <div className={`flex w-full items-center transition-all duration-300 ${active ? 'scale-105 md:scale-100 origin-left' : ''}`}>
                                                                    <div className="flex items-center gap-4">
                                                                        <div className={`w-4 h-4 flex items-center justify-center shrink-0 ${active ? 'text-[#007AFF]' : 'hidden'}`}>
                                                                            <div className="flex gap-[2px] items-end h-full">
                                                                                <div className="wave-bar"></div>
                                                                                <div className="wave-bar"></div>
                                                                                <div className="wave-bar"></div>
                                                                            </div>
                                                                        </div>
                                                                        {!active && <div className="w-3 h-3 rounded-full shrink-0 bg-[#D1D1D6] ml-0.5"></div>}
                                                                        
                                                                        <span className={`${textLg} font-bold transition-all duration-300 ${active ? 'text-[#007AFF]' : 'text-[#1C1C1E]'}`}>{item.task}</span>
                                                                    </div>
                                                                    <span className={`${textMd} font-bold tabular-nums text-right w-[110px] shrink-0 ml-auto tracking-tight transition-all duration-300 ${active ? 'text-[#007AFF]' : 'text-[#8E8E93]'}`}>
                                                                        {item.start}-{item.end}
                                                                    </span>
                                                                </div>
                                                                {active && <p className={`${textXs} font-medium text-[#007AFF] ml-8 mt-1 opacity-80 transition-all duration-300`}>聚會進行中</p>}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            <div className={`${cardStyle} p-7 md:p-8`}>
                                                <h3 className={`${textH3} font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-6 transition-all duration-300`}>敬拜詩歌 SONGS</h3>
                                                <div className="grid grid-cols-2 gap-6">
                                                    <div>
                                                        <p className={`${textXs} font-bold text-[#007AFF] bg-[#007AFF]/10 px-3 py-1 rounded-full mb-4 inline-block transition-all duration-300`}>敬拜歌曲</p>
                                                        <div className="space-y-3">{(data.songs.worship || []).map((s, i) => <p key={i} className={`${textMd} font-bold text-[#1C1C1E] leading-tight transition-all duration-300`}>・{s}</p>)}</div>
                                                    </div>
                                                    <div className="pl-6 border-l border-gray-100">
                                                        <p className={`${textXs} font-bold text-[#34C759] bg-[#34C759]/10 px-3 py-1 rounded-full mb-4 inline-block transition-all duration-300`}>回應詩歌</p>
                                                        <div className="space-y-3">{(data.songs.response || []).map((s, i) => <p key={i} className={`${textMd} font-bold text-[#1C1C1E] leading-tight transition-all duration-300`}>・{s}</p>)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                )}

                                {activeMainTab === 'news' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                        <div className={`${cardStyle} p-6 md:p-8 space-y-4 border-[#FF9500]/20 col-span-1 md:col-span-2`}>
                                            <h3 className={`${textH3} font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4 transition-all duration-300`}>教會公告 ANNOUNCEMENTS</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {(data.announcements || []).map((item, idx) => (
                                                    <div key={item.id} className="bg-white rounded-2xl overflow-hidden border border-[#FF9500]/10 shadow-sm">
                                                        <button type="button" onClick={() => setExpandedNews(expandedNews === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left hover:bg-[#FFF7ED] transition-colors group">
                                                            <div className="flex items-center gap-3 pr-2">
                                                                <span className={`${textMicro} font-bold text-[#FF9500] bg-[#FF9500]/10 px-2.5 py-1 rounded-full uppercase shrink-0 transition-all duration-300`}>{item.date}</span>
                                                                <span className={`${textLg} font-bold text-[#1C1C1E] leading-snug transition-all duration-300`}>{item.title}</span>
                                                            </div>
                                                            <div className="flex items-center gap-1 shrink-0 text-[#8E8E93] group-hover:text-[#FF9500] transition-colors">
                                                                {!expandedNews || expandedNews !== idx ? <span className={`${textXs} hidden sm:inline font-normal transition-all duration-300`}>(展開)</span> : null}
                                                                <Icon name="chevronDown" size={18} className={`transition-transform duration-300 ${expandedNews === idx ? 'rotate-180 text-[#FF9500]' : ''}`} />
                                                            </div>
                                                        </button>
                                                        {expandedNews === idx && (
                                                            <div className="px-5 pb-5 pt-1 border-t border-[#FF9500]/10 mt-1 mx-2">
                                                                <div className={`${textMd} font-normal text-[#48484A] leading-relaxed mt-4 transition-all duration-300`}>
                                                                    <MultilineText text={item.detail} />
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeMainTab === 'community' && (
                                    <div className="space-y-5">
                                        <div className="bg-white/70 p-1.5 rounded-2xl flex gap-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] border border-gray-200">
                                            {['weekday', 'sunday', 'special'].map(tabId => (
                                                <button key={tabId} type="button" onClick={() => setActiveGroupTab(tabId)} className={`flex-1 py-3 md:py-4 ${textSm} font-bold rounded-xl transition-all duration-300 ${activeGroupTab === tabId ? 'bg-white text-[#34C759] shadow-sm' : 'text-[#8E8E93] hover:bg-white/50'}`}>
                                                    {tabId === 'weekday' ? '平日小組' : tabId === 'sunday' ? '主日小組' : '特色/其他'}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                            <div className={`${cardStyle} border-[#34C759]/20 col-span-1 md:col-span-2 lg:col-span-1`}>
                                                {(data.groups[activeGroupTab] || []).map((group, idx) => (
                                                    <div key={idx} className="px-6 py-5 flex items-center justify-between border-b border-[#34C759]/5 last:border-0 hover:bg-gray-50 transition-colors">
                                                        <div className="flex-1 pr-4">
                                                            <p className={`${textLg} font-bold text-[#1C1C1E] transition-all duration-300`}>{group.name}</p>
                                                            <p className={`${textSm} text-[#6C6C70] font-medium mt-1.5 leading-tight transition-all duration-300`}>{group.time}<br className="sm:hidden" /><span className="hidden sm:inline"> · </span>{group.leader}</p>
                                                        </div>
                                                        <span className={`${textXs} font-bold px-3 py-1.5 rounded-xl text-center min-w-[4.5rem] whitespace-nowrap transition-all duration-300 ${group.loc === '馬可樓' ? 'bg-[#34C759]/10 text-[#34C759]' : group.loc === '北科大' ? 'bg-[#007AFF]/10 text-[#007AFF]' : 'bg-[#AEAEB2]/10 text-[#8E8E93]'}`}>
                                                            {group.loc}
                                                        </span>
                                                    </div>
                                                ))}
                                                {(data.groups[activeGroupTab] || []).length === 0 && (
                                                    <div className="p-8 text-center text-gray-400 font-medium">目前無小組資料</div>
                                                )}
                                            </div>

                                            <div className="pt-4 md:pt-0 col-span-1 md:col-span-2 lg:col-span-1">
                                                <h4 className={`${textH3} font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4 px-2 transition-all duration-300`}>海外分會 OVERSEAS</h4>
                                                <div className="space-y-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 sm:space-y-0 lg:space-y-4">
                                                    {(data.overseas || []).map((ov, idx) => (
                                                        <div key={idx} className={`${cardStyle} border-[#34C759]/20 p-6 flex flex-col gap-4 m-0`}>
                                                            <div className="flex items-center gap-4">
                                                                <span className="text-3xl leading-none">{ov.flag}</span>
                                                                <div>
                                                                    <p className={`${textLg} font-bold text-[#1C1C1E] transition-all duration-300`}>{ov.name}</p>
                                                                    <p className={`${textSm} text-[#34C759] font-bold mt-0.5 transition-all duration-300`}>牧師：{ov.leader}</p>
                                                                </div>
                                                            </div>
                                                            <div className={`${textSm} text-[#6C6C70] font-medium space-y-2 bg-[#F2F9F5] p-4 rounded-xl transition-all duration-300`}>
                                                                <p className="flex items-center gap-2"><Icon name="clock" size={16} className="text-[#AEAEB2]" /> <span>{ov.time} 聚會</span></p>
                                                                <p className="flex items-start gap-2"><Icon name="pin" size={16} className="mt-0.5 shrink-0 text-[#AEAEB2]" /> <span className="leading-snug">{ov.loc}</span></p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </main>

                            <footer className="mt-10 md:mt-16 pb-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                                    <div className={`${cardStyle} p-7 md:p-8 text-left border-gray-200/40 bg-white`}>
                                        <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                            <h4 className={`${textH3} font-black uppercase tracking-[0.2em] transition-all duration-300`}>奉獻帳戶資訊</h4>
                                        </div>
                                        <div className="space-y-4">
                                            <button type="button" onClick={() => copyToClipboard(data.offering.account)} className={`w-full flex items-start justify-between gap-3 p-5 bg-transparent rounded-2xl border border-gray-200/80 transition-colors text-left group ${themeGroupHoverBgClass}`}>
                                                <div className="flex items-start gap-3">
                                                    <Icon name="card" size={22} className={`mt-1 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                    <div className="space-y-1">
                                                        <p className={`${textXs} font-bold text-[#8E8E93] uppercase tracking-widest transition-all duration-300`}>{data.offering.bank}</p>
                                                        <p className={`${textHuge} font-black text-[#1C1C1E] tracking-tighter leading-none transition-all duration-300`}>{data.offering.account}</p>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-center gap-1 mt-1 shrink-0">
                                                    <Icon name="copy" size={22} className={`text-[#AEAEB2] transition-colors ${themeGroupHoverTextClass}`} />
                                                    <span className={`${textXs} font-bold text-[#AEAEB2] transition-colors ${themeGroupHoverTextClass}`}>複製</span>
                                                </div>
                                            </button>
                                            <div className="flex items-start gap-3 p-5 bg-transparent rounded-2xl border border-gray-200/70">
                                                <Icon name="users" size={20} className={`mt-0.5 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                <div className="space-y-1">
                                                    <p className={`${textXs} font-bold text-[#8E8E93] uppercase tracking-widest transition-all duration-300`}>戶名 ACCOUNT NAME</p>
                                                    <p className={`${textSm} font-bold text-[#1C1C1E] leading-snug transition-all duration-300`}>{data.offering.name}</p>
                                                </div>
                                            </div>
                                            <p className={`${textXs} text-[#8E8E93] font-medium text-center leading-relaxed mt-2 bg-gray-50 py-2.5 rounded-lg transition-all duration-300`}>＊透過銀行轉帳奉獻後，請通知辦公室同工＊</p>
                                        </div>
                                    </div>

                                    <div className={`${cardStyle} p-7 md:p-8 text-left border-gray-200/40 bg-white`}>
                                        <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                            <h4 className={`${textH3} font-black uppercase tracking-[0.2em] transition-all duration-300`}>聯絡我們 CONTACT</h4>
                                        </div>
                                        <div className="space-y-4">
                                            <a href={`tel:${data.office.phone}`} className={`flex items-start gap-3 p-5 bg-transparent rounded-2xl border border-gray-200/80 transition-colors block cursor-pointer group ${themeGroupHoverBgClass}`}>
                                                <Icon name="phone" size={20} className={`mt-1 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                <div className="space-y-1">
                                                    <p className={`${textXs} font-bold text-[#8E8E93] uppercase tracking-widest transition-all duration-300`}>馬可樓辦公室電話 PHONE</p>
                                                    <p className={`${textHuge} font-black text-[#1C1C1E] tracking-tighter leading-none transition-colors ${themeGroupHoverTextClass}`}>{data.office.phone}</p>
                                                </div>
                                            </a>
                                            <a href={`https://maps.app.goo.gl/a3WAAXcTTWCjBG3K6?g_st=ic}`} target="_blank" rel="noopener noreferrer" className={`flex items-start justify-between gap-3 p-5 bg-transparent rounded-2xl border border-gray-200/80 transition-colors group ${themeGroupHoverBgClass}`}>
                                                <div className="flex items-start gap-3">
                                                    <Icon name="pin" size={20} className={`mt-0.5 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                    <div className="space-y-1 pr-2">
                                                        <p className={`${textXs} font-bold text-[#8E8E93] uppercase tracking-widest transition-all duration-300`}>馬可樓辦公室地址 ADDRESS</p>
                                                        <p className={`${textMd} font-bold text-[#1C1C1E] leading-snug transition-all duration-300`}>{data.office.address}</p>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-center gap-1 shrink-0 mt-1">
                                                    <Icon name="externalLink" size={22} className={`text-[#AEAEB2] transition-colors ${themeGroupHoverTextClass}`} />
                                                    <span className={`${textXs} font-bold text-[#AEAEB2] transition-colors ${themeGroupHoverTextClass}`}>導航</span>
                                                </div>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="relative z-20 flex flex-wrap justify-center items-center gap-x-6 gap-y-4 mb-10">
                                    <a href="https://royal-chosen-race.com/" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 ${textSm} font-bold text-[#007AFF] hover:bg-blue-50 transition-all duration-300 px-3 py-2 rounded-lg`}>
                                        <Icon name="globe" size={18} /> 官方網站
                                    </a>
                                    <a href="https://reurl.cc/epkgeW" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 ${textSm} font-bold text-[#AF52DE] hover:bg-purple-50 transition-all duration-300 px-3 py-2 rounded-lg`}>
                                        <Icon name="plus" size={18} /> 新人名單
                                    </a>
                                    <a href="https://reurl.cc/0mWG5A" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 ${textSm} font-bold text-[#FF2D55] hover:bg-pink-50 transition-all duration-300 px-3 py-2 rounded-lg`}>
                                        <Icon name="message" size={18} /> 聚會回饋
                                    </a>
                                </div>
                                <div className="space-y-4 opacity-40 text-center">
                                    <p className={`${textXs} font-bold text-[#1C1C1E] tracking-[0.1em] uppercase px-4 leading-relaxed transition-all duration-300`}>彼此相愛 · 成全聖徒 · 各盡其職 · 完成使命</p>
                                    <p className={`${textMicro} text-[#1C1C1E] font-bold tracking-widest transition-all duration-300`}>© 2026 中華基督教風一族職場教會</p>
                                </div>
                            </footer>
                        </div>

                        {/* Mobile Floating Bar */}
                        <div className="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[448px] px-4 z-50 flex items-center gap-2.5">
                            <div className="flex-1 bg-white/85 backdrop-blur-xl border border-gray-200/60 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.12)] p-1.5 flex gap-1 justify-center">
                                {[
                                    { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                    { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                    { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                                ].map(item => (
                                    <button key={item.id} type="button" onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex flex-col items-center justify-center h-[3.5rem] rounded-[1.75rem] transition-all duration-300 active:scale-95 ${
                                        activeMainTab === item.id ? `${item.activeBg} text-white shadow-md` : 'text-[#8E8E93] hover:bg-gray-100/50'
                                    }`}>
                                        <Icon name={item.icon} size={20} className="mb-0.5" />
                                        <span className="text-[11px] font-bold tracking-wide">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                            
                            {data?.pdfDownloadUrl && (
                                <a 
                                    href={data.pdfDownloadUrl} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className={`shrink-0 w-[4.25rem] h-[4.25rem] rounded-full flex items-center justify-center transition-all duration-300 text-white active:scale-95 hover:scale-105 shadow-lg ${
                                        activeMainTab === 'worship' ? 'bg-[#007AFF] shadow-[#007AFF]/40' :
                                        activeMainTab === 'news' ? 'bg-[#FF9500] shadow-[#FF9500]/40' :
                                        'bg-[#34C759] shadow-[#34C759]/40'
                                    }`}
                                >
                                    <Icon name="download" size={24} />
                                </a>
                            )}
                        </div>

                        {/* Global Toast Component */}
                        {toast && (
                            <div className="fixed bottom-[100px] md:bottom-12 left-1/2 -translate-x-1/2 z-50 toast-enter w-max max-w-[90vw]">
                                <div className="bg-[#2C2C2E] text-white px-6 py-3.5 rounded-full text-[15px] font-bold shadow-2xl flex items-center gap-2 border border-gray-700">
                                    {toast}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
