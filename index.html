<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>風一族職場教會週報 - 雲端版</title>

    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; background-color: #D1D1D6; }
        .backdrop-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        svg { overflow: visible !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sermon-content { white-space: pre-line; }
        .announcement-detail { white-space: pre-line; }

        /* Wavy Animation for active schedule */
        @keyframes wave-bars {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }
        .wave-bar {
            width: 3px;
            background-color: #007AFF;
            border-radius: 2px;
            animation: wave-bars 1s ease-in-out infinite;
            transform-origin: bottom;
            display: inline-block;
        }
        .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { height: 12px; animation-delay: 0.4s; }

        /* Toast Animation */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-enter { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-[#1C1C1E]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCotyhW5mvvDE9YYSz2sICwMtrFlia1Tyg",
          authDomain: "royal-chosen-race.firebaseapp.com",
          projectId: "royal-chosen-race",
          databaseURL: "https://royal-chosen-race-default-rtdb.firebaseio.com",
          storageBucket: "royal-chosen-race.firebasestorage.app",
          messagingSenderId: "505655650913",
          appId: "1:505655650913:web:9ee5735807e21faee15820"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z" />,
                music: <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />,
                users: <Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Fragment>,
                chevronDown: <path d="m6 9 6 6 6-6" />,
                church: <Fragment><path d="m18 7 4 2v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 22V5l-6-3-6 3v17"/><path d="M12 7v5"/><path d="M10 9h4"/></Fragment>,
                clock: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" /></Fragment>,
                globe: <Fragment><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                message: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                pin: <Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Fragment>,
                card: <Fragment><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20" /></Fragment>,
                download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Fragment>,
                copy: <Fragment><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></Fragment>,
                share: <Fragment><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></Fragment>,
                externalLink: <Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`inline-block ${className}`}>
                    {icons[name]}
                </svg>
            );
        };

        const MultilineText = ({ text, className = "" }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <span className={className}>
                    {lines.map((line, i) => (
                        <Fragment key={i}>
                            {line}
                            {i < lines.length - 1 && <br />}
                        </Fragment>
                    ))}
                </span>
            );
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [activeMainTab, setActiveMainTab] = useState('worship');
            const [activeGroupTab, setActiveGroupTab] = useState('weekday');
            const [verseOpen, setVerseOpen] = useState(false);
            const [expandedSermon, setExpandedSermon] = useState(null);
            const [expandedNews, setExpandedNews] = useState(null);
            const [data, setData] = useState(null);
            const [toast, setToast] = useState('');

            // LocalStorage Caching & Firebase fetching
            useEffect(() => {
                // Check cache first to avoid waiting screen
                const cachedData = localStorage.getItem('bulletin_data_cache');
                if (cachedData) {
                    setData(JSON.parse(cachedData));
                }

                const bulletinRef = db.ref('bulletin_data');
                bulletinRef.on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        setData(cloudData);
                        localStorage.setItem('bulletin_data_cache', JSON.stringify(cloudData));
                    }
                });
                return () => bulletinRef.off();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 10000);
                return () => clearInterval(timer);
            }, []);

            const isTimeActive = (start, end) => {
                const parseMins = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                const nowMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                return nowMins >= parseMins(start) && nowMins < parseMins(end);
            };

            const handleExternalLink = (e, url) => {
                e.preventDefault();
                window.open(url, '_blank', 'noopener,noreferrer');
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setToast('帳號已複製');
                    setTimeout(() => setToast(''), 2500);
                });
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: '風一族職場教會週報',
                            text: '邀請您查看本週最新週報與聚會資訊！',
                            url: window.location.href,
                        });
                    } catch (error) {
                        console.log('分享失敗', error);
                    }
                } else {
                    copyToClipboard(window.location.href);
                    setToast('已複製週報連結');
                }
            };

            const cardStyle = "bg-white border border-gray-100/80 rounded-[2rem] shadow-sm overflow-hidden transition-all duration-300";

            if (!data) {
                // Skeleton Screen
                return (
                    <div className="w-full min-h-screen flex items-start justify-center bg-[#E5E5EA] pt-6 px-4 pb-20">
                        <div className="w-full max-w-4xl space-y-6 animate-pulse">
                            <div className="h-20 bg-gray-300/60 rounded-2xl w-full"></div>
                            <div className="h-80 bg-gray-300/60 rounded-[2rem] w-full"></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="h-64 bg-gray-300/60 rounded-[2rem]"></div>
                                <div className="h-64 bg-gray-300/60 rounded-[2rem]"></div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Changed Green #34C759 to #34C759 (Tailwind green-700) for better contrast
            const themeColorClass = activeMainTab === 'worship' ? 'text-[#007AFF]' : activeMainTab === 'news' ? 'text-[#FF9500]' : 'text-[#34C759]';
            const themeBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]' : activeMainTab === 'news' ? 'bg-[#FF9500]' : 'bg-[#34C759]';
            const themeLightBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]/10' : activeMainTab === 'news' ? 'bg-[#FF9500]/10' : 'bg-[#34C759]/10';

            return (
                <div className="w-full min-h-screen flex justify-center bg-[#E5E5EA]">
                    <div className={`w-full max-w-4xl min-h-screen relative shadow-2xl hide-scrollbar pb-36 md:pb-10 transition-colors duration-700 ${
                        activeMainTab === 'worship' ? 'bg-blue-50' : activeMainTab === 'news' ? 'bg-[#FFF7ED]' : 'bg-[#F0FDF4]'
                    }`}>

                        <header className="sticky top-0 z-40 bg-white/60 backdrop-blur-xl border-b border-gray-200/50 px-6 py-4">
                            <div className="flex justify-between items-center mb-1">
                                <h1 className="text-xl md:text-2xl font-bold tracking-tight text-[#1C1C1E]">風一族職場教會</h1>
                                <div className="flex gap-3 items-center">
                                    <button onClick={handleShare} className="flex items-center gap-1.5 text-xs md:text-sm font-bold text-[#48484A] bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-full transition-colors duration-300">
                                        <Icon name="share" size={14} /> <span className="hidden sm:inline">分享此週報</span>
                                    </button>
                                    <span className={`text-xs md:text-sm font-bold px-3 py-1.5 rounded-full transition-colors duration-500 ${themeColorClass} ${themeLightBgClass}`}>
                                        {data.bulletinDate.slice(5)} {data.weekNumber}
                                    </span>
                                    {data?.pdfDownloadUrl && (
                                        <a 
                                            href={data.pdfDownloadUrl} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className={`hidden md:flex items-center justify-center w-8 h-8 rounded-full text-white transition-all duration-300 hover:scale-110 ${themeBgClass} shadow-md`}
                                            title="下載週報 PDF"
                                        >
                                            <Icon name="download" size={16} />
                                        </a>
                                    )}
                                </div>
                            </div>
                            <p className="text-xs md:text-sm text-[#6C6C70] font-medium flex items-center gap-2 mt-1.5">
                                <span className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full transition-colors duration-500 ${themeBgClass}`}></span>
                                2026年度異象：{data.vision}
                            </p>
                        </header>

                        <div className="hidden md:flex sticky top-[73px] z-30 bg-white/80 backdrop-blur-md border-b border-gray-200/50 px-6 py-3 gap-4">
                            {[
                                { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex items-center justify-center gap-2 h-10 rounded-xl transition-all duration-300 ${
                                    activeMainTab === item.id ? `${item.activeBg} text-white shadow-md` : 'bg-white text-[#8E8E93] border border-gray-200 hover:bg-gray-50'
                                }`}>
                                    <Icon name={item.icon} size={18} />
                                    <span className="text-[14px] font-bold tracking-wide">{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="p-5 space-y-6">
                            
                            <section>
                                <div className={`${cardStyle} p-7 md:p-10 border-none bg-gradient-to-br from-white to-[#F9F9F9] relative overflow-hidden`}>
                                    <div className="relative z-10">
                                        <div className={`flex items-center gap-2 mb-3 transition-colors duration-500 ${themeColorClass}`}>
                                            <Icon name="book" size={22} />
                                            <span className="text-xs md:text-sm font-black tracking-widest uppercase">信息主題</span>
                                        </div>
                                        <h2 className="text-2xl sm:text-3xl md:text-4xl font-black text-[#1C1C1E] mb-6 tracking-normal leading-normal">  {data.theme.title}</h2>
                                        <div className="flex gap-6 mb-6">
                                            <div className="space-y-1"><p className="text-xs md:text-sm text-[#8E8E93] font-bold uppercase tracking-wider">講員</p><p className="text-[17px] md:text-xl font-bold text-[#1C1C1E]">{data.theme.speaker}</p></div>
                                            <div className="w-[1px] h-10 md:h-12 bg-gray-200"></div>
                                            <div className="space-y-1"><p className="text-xs md:text-sm text-[#8E8E93] font-bold uppercase tracking-wider">司會</p><p className="text-[17px] md:text-xl font-bold text-[#1C1C1E]">{data.theme.moderator}</p></div>
                                        </div>
                                        <button onClick={() => setVerseOpen(!verseOpen)} className="w-full md:w-auto md:px-8 py-3.5 bg-[#F2F2F7] rounded-xl flex items-center justify-center gap-3 text-[15px] font-bold text-[#1C1C1E] active:scale-[0.98] transition-all hover:bg-gray-200">
                                            <span>本週經文</span><Icon name="chevronDown" size={16} className={`transition-transform duration-300 ${verseOpen ? 'rotate-180' : ''}`} />
                                        </button>
                                        {/* Adjusted Typograpy for Scripture */}
                                        {verseOpen && <div className="mt-4 p-4 md:p-6 bg-white/80 rounded-xl border border-gray-100 text-[15px] md:text-[16px] leading-loose font-normal text-[#48484A] italic">{data.theme.scripture}</div>}
                                    </div>
                                    <div 
                                        className="absolute top-0 right-0 w-64 h-64 md:w-96 md:h-96 -mr-24 -mt-24 pointer-events-none transition-colors duration-700"
                                        style={{
                                            background: activeMainTab === 'worship' 
                                                ? 'radial-gradient(circle, rgba(0, 122, 255, 0.2) 0%, rgba(0, 122, 255, 0) 70%)' 
                                                : activeMainTab === 'news' 
                                                ? 'radial-gradient(circle, rgba(255, 149, 0, 0.15) 0%, rgba(255, 149, 0, 0) 70%)' 
                                                : 'radial-gradient(circle, rgba(21, 128, 61, 0.15) 0%, rgba(21, 128, 61, 0) 70%)'
                                        }}
                                    ></div>
                                </div>
                            </section>

                            <main>
                                {activeMainTab === 'worship' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                        
                                        <div className={`${cardStyle} p-6 md:p-8 col-span-1 md:col-span-2 lg:col-span-1 lg:row-span-2`}>
                                            <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-5">信息大綱 OUTLINE</h3>
                                            <div className="space-y-4">
                                                {(data.sermonOutline || []).map((item, idx) => (
                                                    <div key={idx} className="bg-[#F2F2F7] rounded-2xl overflow-hidden border border-gray-100">
                                                        <button onClick={() => setExpandedSermon(expandedSermon === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left hover:bg-gray-200 transition-colors">
                                                            <span className="text-[16px] font-bold text-[#1C1C1E] pr-4">{item.title}</span>
                                                            <Icon name="chevronDown" size={18} className={`text-[#AEAEB2] shrink-0 transition-transform ${expandedSermon === idx ? 'rotate-180' : ''}`} />
                                                        </button>
                                                        {expandedSermon === idx && (
                                                            <div className="px-5 pb-5 pt-1 space-y-4">
                                                                {(item.content || []).map((p, pi) => (
                                                                    // Adjusted Typograpy for outline
                                                                    <p key={pi} className="text-[15px] font-normal text-[#48484A] leading-relaxed">
                                                                        <MultilineText text={p} />
                                                                    </p>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-6 col-span-1 lg:col-span-1">
                                            <div className={`${cardStyle} p-7 md:p-8`}>
                                                <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-6">聚會流程 SCHEDULE</h3>
                                                <div className="space-y-6">
                                                    {(data.schedule || []).map((item, idx) => {
                                                        const active = isTimeActive(item.start, item.end);
                                                        return (
                                                            <div key={idx} className={`flex w-full items-center transition-all duration-300 ${active ? 'scale-105 md:scale-100 origin-left' : ''}`}>
                                                                <div className="flex items-center gap-4">
                                                                    {/* Wavy Animation added here */}
                                                                    <div className={`w-4 h-4 flex items-center justify-center shrink-0 ${active ? '' : 'hidden'}`}>
                                                                        <div className="flex gap-[2px] items-end h-full">
                                                                            <div className="wave-bar"></div>
                                                                            <div className="wave-bar"></div>
                                                                            <div className="wave-bar"></div>
                                                                        </div>
                                                                    </div>
                                                                    {/* Default inactive dot */}
                                                                    {!active && <div className="w-3 h-3 rounded-full shrink-0 bg-[#D1D1D6] ml-0.5"></div>}
                                                                    
                                                                    <span className={`text-[17px] font-bold  ${active ? 'text-[#007AFF]' : 'text-[#1C1C1E]'}`}>{item.task}</span>
                                                                </div>
                                                                <span className={`text-[16px] font-bold tabular-nums text-right w-[110px] shrink-0 ml-auto tracking-tight ${active ? 'text-[#007AFF]' : 'text-[#8E8E93]'}`}>
                                                                    {item.start}-{item.end}
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            <div className={`${cardStyle} p-7 md:p-8`}>
                                                <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-6">敬拜詩歌 SONGS</h3>
                                                <div className="grid grid-cols-2 gap-6">
                                                    <div>
                                                        <p className="text-xs font-bold text-[#007AFF] bg-[#007AFF]/10 px-3 py-1 rounded-full mb-4 inline-block">敬拜歌曲</p>
                                                        <div className="space-y-3">{(data.songs.worship || []).map((s, i) => <p key={i} className="text-[15px] font-bold text-[#1C1C1E] leading-tight">・{s}</p>)}</div>
                                                    </div>
                                                    <div className="pl-6 border-l border-gray-100">
                                                        <p className="text-xs font-bold text-[#34C759] bg-[#34C759]/10 px-3 py-1 rounded-full mb-4 inline-block">回應詩歌</p>
                                                        <div className="space-y-3">{(data.songs.response || []).map((s, i) => <p key={i} className="text-[15px] font-bold text-[#1C1C1E] leading-tight">・{s}</p>)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                )}

                                {activeMainTab === 'news' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                        <div className={`${cardStyle} p-6 md:p-8 space-y-4 border-[#FF9500]/20 col-span-1 md:col-span-2`}>
                                            <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4">教會公告 ANNOUNCEMENTS</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {(data.announcements || []).map((item, idx) => (
                                                    <div key={item.id} className="bg-[#FFFDF9] rounded-2xl overflow-hidden border border-[#FF9500]/10">
                                                        <button onClick={() => setExpandedNews(expandedNews === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left hover:bg-[#FFF7ED] transition-colors">
                                                            <div className="flex items-center gap-3 pr-4">
                                                                <span className="text-[11px] font-bold text-[#FF9500] bg-[#FF9500]/10 px-2.5 py-1 rounded-full uppercase shrink-0">{item.date}</span>
                                                                <span className="text-[16px] font-bold text-[#1C1C1E]">{item.title}</span>
                                                            </div>
                                                            <Icon name="chevronDown" size={18} className={`text-[#AEAEB2] shrink-0 transition-transform ${expandedNews === idx ? 'rotate-180' : ''}`} />
                                                        </button>
                                                        {expandedNews === idx && (
                                                            <div className="px-5 pb-5 pt-1">
                                                                {/* Adjusted Typography for Announcements */}
                                                                <p className="text-[15px] font-normal text-[#48484A] leading-relaxed">
                                                                    <MultilineText text={item.detail} />
                                                                </p>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeMainTab === 'community' && (
                                    <div className="space-y-5">
                                        <div className="bg-white/60 p-1 rounded-2xl flex gap-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)] border border-[#34C759]/10">
                                            {['weekday', 'sunday', 'special'].map(tabId => (
                                                <button key={tabId} onClick={() => setActiveGroupTab(tabId)} className={`flex-1 py-3 md:py-4 text-[14px] md:text-[15px] font-bold rounded-xl transition-all ${activeGroupTab === tabId ? 'bg-white text-[#34C759] shadow-sm' : 'text-[#8E8E93] hover:bg-white/50'}`}>
                                                    {tabId === 'weekday' ? '平日小組' : tabId === 'sunday' ? '主日小組' : '特色/其他'}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                            <div className={`${cardStyle} border-[#34C759]/20 col-span-1 md:col-span-2 lg:col-span-1`}>
                                                {(data.groups[activeGroupTab] || []).map((group, idx) => (
                                                    <div key={idx} className="px-6 py-5 flex items-center justify-between border-b border-[#34C759]/5 last:border-0 hover:bg-gray-50 transition-colors">
                                                        <div className="flex-1 pr-4">
                                                            <p className="text-[17px] font-bold text-[#1C1C1E]">{group.name}</p>
                                                            <p className="text-[13px] text-[#6C6C70] font-medium mt-1 leading-tight">{group.time}<br className="sm:hidden" /><span className="hidden sm:inline"> · </span>{group.leader}</p>
                                                        </div>
                                                        <span className={`text-[12px] font-bold px-3 py-1.5 rounded-xl text-center min-w-[4.5rem] whitespace-nowrap ${group.loc === '馬可樓' ? 'bg-[#34C759]/10 text-[#34C759]' : group.loc === '北科大' ? 'bg-[#007AFF]/10 text-[#007AFF]' : 'bg-[#AEAEB2]/10 text-[#8E8E93]'}`}>
                                                            {group.loc}
                                                        </span>
                                                    </div>
                                                ))}
                                                {(data.groups[activeGroupTab] || []).length === 0 && (
                                                    <div className="p-8 text-center text-gray-400 font-medium">目前無小組資料</div>
                                                )}
                                            </div>

                                            <div className="pt-4 md:pt-0 col-span-1 md:col-span-2 lg:col-span-1">
                                                <h4 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4 px-2">海外分會 OVERSEAS</h4>
                                                <div className="space-y-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 sm:space-y-0 lg:space-y-4">
                                                    {(data.overseas || []).map((ov, idx) => (
                                                        <div key={idx} className={`${cardStyle} border-[#34C759]/20 p-6 flex flex-col gap-4 m-0`}>
                                                            <div className="flex items-center gap-4">
                                                                <span className="text-3xl leading-none">{ov.flag}</span>
                                                                <div>
                                                                    <p className="text-[17px] font-bold text-[#1C1C1E]">{ov.name}</p>
                                                                    <p className="text-[13px] text-[#34C759] font-bold mt-0.5">牧師：{ov.leader}</p>
                                                                </div>
                                                            </div>
                                                            <div className="text-[13px] text-[#6C6C70] font-medium space-y-2 bg-[#F2F9F5] p-3.5 rounded-xl">
                                                                <p className="flex items-center gap-2"><Icon name="clock" size={14} className="text-[#AEAEB2]" /> {ov.time} 聚會</p>
                                                                <p className="flex items-start gap-2"><Icon name="pin" size={14} className="mt-0.5 shrink-0 text-[#AEAEB2]" /> <span className="leading-snug">{ov.loc}</span></p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </main>

                            <footer className="mt-10 md:mt-16 pb-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                                    <div className={`${cardStyle} p-7 md:p-8 text-left border-gray-200/40`}>
                                        <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                            <h4 className="text-xs font-black uppercase tracking-[0.2em]">奉獻帳戶資訊</h4>
                                        </div>
                                        <div className="space-y-4">
                                            {/* Changed Offering Account Box to be interactive with copy functionality */}
                                            <button onClick={() => copyToClipboard(data.offering.account)} className="w-full flex items-start justify-between gap-3 p-4 bg-transparent rounded-2xl border border-gray-200/70 hover:bg-gray-50 active:bg-gray-100 transition-colors text-left group">
                                                <div className="flex items-start gap-3">
                                                    <Icon name="card" size={18} className={`mt-1 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                    <div className="space-y-1">
                                                        <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">{data.offering.bank}</p>
                                                        <p className="text-[20px] sm:text-[24px] font-black text-[#1C1C1E] tracking-tighter leading-none">{data.offering.account}</p>
                                                    </div>
                                                </div>
                                                <Icon name="copy" size={16} className="text-gray-300 group-hover:text-[#007AFF] transition-colors mt-2" />
                                            </button>
                                            <div className="flex items-start gap-3 p-4 bg-transparent rounded-2xl border border-gray-200/70">
                                                <Icon name="users" size={18} className={`mt-0.5 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                <div className="space-y-1">
                                                    <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">戶名 ACCOUNT NAME</p>
                                                    <p className="text-[14px] sm:text-[15px] font-bold text-[#1C1C1E] leading-snug">{data.offering.name}</p>
                                                </div>
                                            </div>
                                            <p className="text-[11px] sm:text-xs text-[#8E8E93] italic text-center leading-relaxed mt-2">＊透過銀行轉帳奉獻後，請通知辦公室同工＊</p>
                                        </div>
                                    </div>

                                    <div className={`${cardStyle} p-7 md:p-8 text-left border-gray-200/40`}>
                                        <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                            <h4 className="text-xs font-black uppercase tracking-[0.2em]">聯絡我們 CONTACT</h4>
                                        </div>
                                        <div className="space-y-4">
                                            <a href={`tel:${data.office.phone}`} className="flex items-start gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-200/70 hover:bg-gray-200 transition-colors block cursor-pointer">
                                                <Icon name="phone" size={18} className={`mt-1 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                <div className="space-y-1">
                                                    <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">馬可樓辦公室電話 PHONE</p>
                                                    <p className="text-[24px] font-black text-[#1C1C1E] tracking-tighter leading-none">{data.office.phone}</p>
                                                </div>
                                            </a>
                                            {/* Modified to correct Google Maps Search API link */}
                                            <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.office.address)}`} target="_blank" rel="noopener noreferrer" className="flex items-start justify-between gap-3 p-4 bg-transparent rounded-2xl border border-gray-200/70 hover:bg-gray-50 transition-colors group">
                                                <div className="flex items-start gap-3">
                                                    <Icon name="pin" size={18} className={`mt-0.5 shrink-0 transition-colors duration-500 ${themeColorClass}`} />
                                                    <div className="space-y-1">
                                                        <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">馬可樓辦公室地址 ADDRESS</p>
                                                        <p className="text-[15px] font-bold text-[#1C1C1E] leading-snug">{data.office.address}</p>
                                                    </div>
                                                </div>
                                                {/* Modified to externalLink */}
                                                <Icon name="externalLink" size={16} className="text-gray-300 group-hover:text-[#007AFF] mt-1 shrink-0 transition-colors" />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="relative z-20 flex flex-wrap justify-center items-center gap-x-6 gap-y-4 mb-10">
                                    <a href="https://royal-chosen-race.com/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 text-[14px] font-bold text-[#007AFF] hover:opacity-70 active:opacity-50 transition-opacity px-2 py-1">
                                        <Icon name="globe" size={16} /> 官方網站
                                    </a>
                                    <a href="https://reurl.cc/epkgeW" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 text-[14px] font-bold text-[#AF52DE] hover:opacity-70 active:opacity-50 transition-opacity px-2 py-1">
                                        <Icon name="plus" size={16} /> 新人名單
                                    </a>
                                    <a href="https://reurl.cc/0mWG5A" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 text-[14px] font-bold text-[#FF2D55] hover:opacity-70 active:opacity-50 transition-opacity px-2 py-1">
                                        <Icon name="message" size={16} /> 聚會回饋
                                    </a>
                                </div>
                                <div className="space-y-4 opacity-40 text-center">
                                    <p className="text-[12px] md:text-[14px] font-bold text-[#1C1C1E] tracking-[0.1em] uppercase px-4 leading-relaxed">彼此相愛 · 成全聖徒 · 各盡其職 · 完成使命</p>
                                    <p className="text-xs text-[#1C1C1E] font-bold tracking-widest">© 2026 中華基督教風一族職場教會</p>
                                </div>
                            </footer>
                        </div>

                        {/* Mobile Floating Bar */}
                        <div className="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[448px] px-4 z-50 flex items-center gap-2.5">
                            <div className="flex-1 bg-white/85 backdrop-blur-xl border border-gray-200/60 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.1)] p-1.5 flex gap-1 justify-center">
                                {[
                                    { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                    { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                    { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex flex-col items-center justify-center h-[3.25rem] rounded-[1.75rem] transition-all duration-300 active:scale-95 ${
                                        activeMainTab === item.id ? `${item.activeBg} text-white shadow-md` : 'text-[#8E8E93] hover:bg-gray-100/50'
                                    }`}>
                                        <Icon name={item.icon} size={20} className="mb-0.5" />
                                        <span className="text-[11px] font-bold tracking-wide">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                            
                            {data?.pdfDownloadUrl && (
                                <a 
                                    href={data.pdfDownloadUrl} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className={`shrink-0 w-[4rem] h-[4rem] rounded-full flex items-center justify-center transition-all duration-300 text-white active:scale-95 hover:scale-105 ${
                                        activeMainTab === 'worship' ? 'bg-[#007AFF] shadow-[0_10px_25px_rgba(0,122,255,0.4)]' :
                                        activeMainTab === 'news' ? 'bg-[#FF9500] shadow-[0_10px_25px_rgba(255,149,0,0.4)]' :
                                        'bg-[#34C759] shadow-[0_10px_25px_rgba(21,128,61,0.4)]'
                                    }`}
                                >
                                    <Icon name="download" size={24} />
                                </a>
                            )}
                        </div>

                        {/* Global Toast Component */}
                        {toast && (
                            <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 toast-enter">
                                <div className="bg-[#1C1C1E] text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-lg flex items-center gap-2">
                                    <Icon name="copy" size={16} /> {toast}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
