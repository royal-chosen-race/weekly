<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>風一族職場教會線上週報</title>

    <link rel="icon" type="image/png" href="favicon_io/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="favicon_io/apple-touch-icon.png">
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; background-color: #F2F2EE; }
        .backdrop-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        svg { overflow: visible !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sermon-content { white-space: pre-line; }
        .announcement-detail { white-space: pre-line; }

        @keyframes wave-bars {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }
        .wave-bar {
            width: 3px;
            background-color: currentColor;
            border-radius: 2px;
            animation: wave-bars 1s ease-in-out infinite;
            transform-origin: bottom;
            display: inline-block;
        }
        .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { height: 12px; animation-delay: 0.4s; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translate(-50%, 10px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-enter { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-[#1C1C1E]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, Fragment, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCotyhW5mvvDE9YYSz2sICwMtrFlia1Tyg",
          authDomain: "royal-chosen-race.firebaseapp.com",
          projectId: "royal-chosen-race",
          databaseURL: "https://royal-chosen-race-default-rtdb.firebaseio.com",
          storageBucket: "royal-chosen-race.firebasestorage.app",
          messagingSenderId: "505655650913",
          appId: "1:505655650913:web:9ee5735807e21faee15820"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z" />,
                music: <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />,
                users: <Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Fragment>,
                chevronDown: <path d="m6 9 6 6 6-6" />,
                church: <Fragment><path d="m18 7 4 2v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0a2 2 0 0 0-2 2v4"/><path d="M18 22V5l-6-3-6 3v17"/><path d="M12 7v5"/><path d="M10 9h4"/></Fragment>,
                clock: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" /></Fragment>,
                globe: <Fragment><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                message: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                pin: <Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Fragment>,
                card: <Fragment><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20" /></Fragment>,
                download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Fragment>,
                copy: <Fragment><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></Fragment>,
                share: <Fragment><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></Fragment>,
                externalLink: <Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`inline-block ${className}`}>
                    {icons[name]}
                </svg>
            );
        };

        const MultilineText = ({ text, className = "" }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className={className}>
                    {lines.map((line, i) => {
                        const isListItem = /^(\d+[\.、]|[・\-\*])(?:\s+)?/.test(line.trim());
                        return (
                            <p key={i} className={`mb-2.5 last:mb-0 min-h-[1.2em] ${isListItem ? 'pl-[1.5em] -indent-[1.5em]' : ''}`}>
                                {line}
                            </p>
                        );
                    })}
                </div>
            );
        };

        const SeasonalEffects = ({ isMay, isDec }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!isMay && !isDec) return;

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                
                const particleCount = isMay ? 35 : 70;
                const particles = [];

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height - canvas.height, 
                        size: isMay ? Math.random() * 4 + 4 : Math.random() * 2.5 + 0.5,
                        speedY: isMay ? Math.random() * 0.8 + 0.4 : Math.random() * 1 + 0.2,
                        speedX: Math.random() * 0.5 - 0.25, 
                        angle: Math.random() * Math.PI * 2, 
                        spinSpeed: Math.random() * 0.04 - 0.02, 
                        sway: Math.random() * 1.5 + 0.5, 
                        swaySpeed: Math.random() * 0.02 + 0.01, 
                        opacity: Math.random() * 0.6 + 0.3 
                    });
                }

                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    particles.forEach(p => {
                        p.y += p.speedY; 
                        p.angle += p.swaySpeed; 
                        p.x += Math.sin(p.angle) * p.sway + p.speedX; 

                        if (p.y > canvas.height) {
                            p.y = -20;
                            p.x = Math.random() * canvas.width;
                        }
                        if (p.x > canvas.width + 20) p.x = -20;
                        if (p.x < -20) p.x = canvas.width + 20;

                        ctx.save();
                        ctx.translate(p.x, p.y);

                        if (isMay) {
                            ctx.rotate(p.angle);
                            ctx.scale(Math.sin(p.angle * 2), 1); 
                            ctx.fillStyle = `rgba(255, 160, 178, ${p.opacity})`; 
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.bezierCurveTo(p.size, -p.size/2, p.size, p.size*1.5, 0, p.size*2);
                            ctx.bezierCurveTo(-p.size, p.size*1.5, -p.size, -p.size/2, 0, 0);
                            ctx.fill();
                        } else {
                            ctx.fillStyle = `rgba(180, 215, 255, ${p.opacity})`;
                            ctx.shadowBlur = p.size * 3; 
                            ctx.shadowColor = 'rgba(100, 150, 255, 0.8)';
                            
                            ctx.beginPath();
                            ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        ctx.restore();
                    });

                    animationFrameId = requestAnimationFrame(render);
                };

                render();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isMay, isDec]);

            if (!isMay && !isDec) return null;

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed inset-0 pointer-events-none z-[35] w-full h-full"
                    style={{ display: 'block' }} 
                />
            );
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [activeMainTab, setActiveMainTab] = useState('worship');
            const [activeGroupTab, setActiveGroupTab] = useState('weekday');
            const [verseOpen, setVerseOpen] = useState(false);
            
            const [expandedSermons, setExpandedSermons] = useState([]);
            const [expandedNewsList, setExpandedNewsList] = useState([]);
            
            const [data, setData] = useState(null);
            const [toast, setToast] = useState('');
            const [fontSize, setFontSize] = useState('normal'); 
            
            const [seasonalEnabled, setSeasonalEnabled] = useState(true);

            useEffect(() => {
                const cachedData = localStorage.getItem('bulletin_data_cache');
                if (cachedData) {
                    setData(JSON.parse(cachedData));
                }

                const bulletinRef = db.ref('bulletin_data');
                bulletinRef.on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        setData(cloudData);
                        localStorage.setItem('bulletin_data_cache', JSON.stringify(cloudData));
                    }
                });
                return () => bulletinRef.off();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 10000);
                return () => clearInterval(timer);
            }, []);

            const isTimeActive = (start, end) => {
                const isSunday = currentTime.getDay() === 0;
                if (!isSunday) return false;

                const parseMins = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                const nowMins = currentTime.getHours() * 60 + currentTime.getMinutes();
                return nowMins >= parseMins(start) && nowMins < parseMins(end);
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    if (navigator.vibrate) navigator.vibrate(50);
                    setToast('✅ 帳號複製成功，可以去銀行 App 貼上囉！');
                    setTimeout(() => setToast(''), 3000);
                });
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: '風一族職場教會週報',
                            text: '邀請您查看本週最新週報與聚會資訊！',
                            url: window.location.href,
                        });
                    } catch (error) {
                        console.log('分享失敗', error);
                    }
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    setToast('✅ 已複製週報連結');
                    setTimeout(() => setToast(''), 3000);
                }
            };
            
            const toggleFontSize = () => {
                setFontSize(current => current === 'normal' ? 'large' : 'normal');
            };

            // 調整卡片樣式，讓它更俐落
            const cardStyle = "bg-white border border-gray-100/80 rounded-[1.5rem] shadow-sm overflow-hidden transition-all duration-300";

            const currentMonth = currentTime.getMonth() + 1;
            const isSpecialMonth = currentMonth === 5 || currentMonth === 12;
            const isMay = seasonalEnabled && (currentMonth === 5); 
            const isDec = seasonalEnabled && currentMonth === 12;

            let outerBgClass = '';
            let mainContentBgClass = '';

            if (isMay) {
                outerBgClass = 'bg-[#FFF0F5]';
                mainContentBgClass = 'bg-[#FFF0F5]';
            } else if (isDec) {
                outerBgClass = 'bg-[#E2E8F0]';
                mainContentBgClass = 'bg-[#F1F5F9]';
            } else {
                outerBgClass = 'bg-[#F2F2EE]';
                mainContentBgClass = activeMainTab === 'worship' ? 'bg-[#F2F6FA]' : activeMainTab === 'news' ? 'bg-[#FCF6ED]' : 'bg-[#F2FAF4]';
            }

            if (!data) {
                return (
                    <div className={`w-full min-h-screen flex items-start justify-center pt-6 px-4 pb-20 transition-colors duration-300 ${outerBgClass}`}>
                        <div className="w-full max-w-4xl lg:max-w-6xl space-y-6 animate-pulse">
                            <div className="h-20 bg-gray-300/60 rounded-2xl w-full"></div>
                            <div className="h-80 bg-gray-300/60 rounded-[2rem] w-full"></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start">
                                <div className="h-64 bg-gray-300/60 rounded-[2rem] lg:col-span-2"></div>
                                <div className="h-64 bg-gray-300/60 rounded-[2rem]"></div>
                            </div>
                        </div>
                    </div>
                );
            }

            let themeColorClass = '';
            let themeBgClass = '';
            let themeLightBgClass = '';
            let themeScriptureBorderClass = '';
            let themeScriptureBgClass = '';
            let themeGroupHoverTextClass = '';
            let themeGroupHoverBgClass = '';

            if (isMay) {
                const pinkColor = 'text-[#FF4D85]';
                const pinkBg = 'bg-[#FF4D85]';
                themeColorClass = pinkColor;
                themeBgClass = pinkBg;
                themeLightBgClass = 'bg-[#FF4D85]/10';
                themeScriptureBorderClass = 'border-[#FF4D85]/40';
                themeScriptureBgClass = 'bg-[#FF4D85]/5';
                themeGroupHoverTextClass = 'group-hover:text-[#FF4D85]';
                themeGroupHoverBgClass = 'hover:bg-[#FF4D85]/5 active:bg-[#FF4D85]/10';
            } else if (isDec) {
                const iceColor = 'text-[#0082CC]';
                const iceBg = 'bg-[#0082CC]';
                themeColorClass = iceColor;
                themeBgClass = iceBg;
                themeLightBgClass = 'bg-[#0082CC]/10';
                themeScriptureBorderClass = 'border-[#0082CC]/40';
                themeScriptureBgClass = 'bg-[#0082CC]/5';
                themeGroupHoverTextClass = 'group-hover:text-[#0082CC]';
                themeGroupHoverBgClass = 'hover:bg-[#0082CC]/5 active:bg-[#0082CC]/10';
            } else {
                themeColorClass = activeMainTab === 'worship' ? 'text-[#007AFF]' : activeMainTab === 'news' ? 'text-[#FF9500]' : 'text-[#34C759]';
                themeBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]' : activeMainTab === 'news' ? 'bg-[#FF9500]' : 'bg-[#34C759]';
                themeLightBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]/10' : activeMainTab === 'news' ? 'bg-[#FF9500]/10' : 'bg-[#34C759]/10';
                themeScriptureBorderClass = activeMainTab === 'worship' ? 'border-[#007AFF]/40' : activeMainTab === 'news' ? 'border-[#FF9500]/40' : 'border-[#34C759]/40';
                themeScriptureBgClass = activeMainTab === 'worship' ? 'bg-[#007AFF]/5' : activeMainTab === 'news' ? 'bg-[#FF9500]/5' : 'bg-[#34C759]/5';
                themeGroupHoverTextClass = activeMainTab === 'worship' ? 'group-hover:text-[#007AFF]' : activeMainTab === 'news' ? 'group-hover:text-[#FF9500]' : 'group-hover:text-[#34C759]';
                themeGroupHoverBgClass = activeMainTab === 'worship' ? 'hover:bg-[#007AFF]/5 active:bg-[#007AFF]/10' : activeMainTab === 'news' ? 'hover:bg-[#FF9500]/5 active:bg-[#FF9500]/10' : 'hover:bg-[#34C759]/5 active:bg-[#34C759]/10';
            }

            let themeGradient = '';
            if (isMay) {
                themeGradient = 'radial-gradient(circle, rgba(255, 77, 133, 0.12) 0%, rgba(255, 77, 133, 0) 70%)';
            } else if (isDec) {
                themeGradient = 'radial-gradient(circle, rgba(0, 130, 204, 0.12) 0%, rgba(0, 130, 204, 0) 70%)';
            } else {
                themeGradient = activeMainTab === 'worship' 
                    ? 'radial-gradient(circle, rgba(0, 122, 255, 0.12) 0%, rgba(0, 122, 255, 0) 70%)' 
                    : activeMainTab === 'news' 
                    ? 'radial-gradient(circle, rgba(255, 149, 0, 0.12) 0%, rgba(255, 149, 0, 0) 70%)' 
                    : 'radial-gradient(circle, rgba(52, 199, 89, 0.12) 0%, rgba(52, 199, 89, 0) 70%)';
            }

            const textH1 = fontSize === 'large' ? 'text-[24px] md:text-[28px]' : 'text-[20px] md:text-[24px]';
            const textH2 = fontSize === 'large' ? 'text-[32px] md:text-[40px]' : 'text-[26px] md:text-[34px]';
            const textH3 = fontSize === 'large' ? 'text-[14px]' : 'text-[12px]'; 
            const textLg = fontSize === 'large' ? 'text-[20px]' : 'text-[17px]'; 
            const textMd = fontSize === 'large' ? 'text-[19px]' : 'text-[16px]'; 
            const textSm = fontSize === 'large' ? 'text-[16px]' : 'text-[14px]'; 
            const textXs = fontSize === 'large' ? 'text-[14px]' : 'text-[12px]'; 
            const textMicro = fontSize === 'large' ? 'text-[13px]' : 'text-[11px]'; 
            const textHuge = fontSize === 'large' ? 'text-[28px] md:text-[32px]' : 'text-[24px] md:text-[28px]'; 

            return (
                <div className={`w-full min-h-screen flex justify-center transition-colors duration-300 ${outerBgClass}`}>
                    
                    <SeasonalEffects isMay={isMay} isDec={isDec} />

                    <div className={`w-full max-w-4xl lg:max-w-6xl min-h-screen relative z-30 shadow-2xl hide-scrollbar pb-36 md:pb-10 transition-colors duration-300 ${mainContentBgClass}`}>

                        <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-gray-200/50 px-5 py-3 md:px-6 md:py-4">
                            <div className="flex flex-nowrap justify-between items-center mb-1.5 gap-2">
                                <div className="flex flex-wrap items-center gap-2 md:gap-3 mt-1 md:mt-0">
                                    <h1 className={`${textH1} font-black tracking-tight text-[#1C1C1E] whitespace-nowrap transition-all duration-300`}>風一族職場教會</h1>
                                    <span className={`${textMicro} font-bold px-2.5 py-0.5 rounded-full whitespace-nowrap transition-all duration-300 ${themeColorClass} ${themeLightBgClass}`}>
                                        {data.bulletinDate.slice(5)} {data.weekNumber}
                                    </span>
                                </div>
                                
                                <div className="flex gap-2 items-center shrink-0">
                                    <button type="button" onClick={toggleFontSize} className="flex items-center justify-center w-8 h-8 md:w-9 md:h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-[#48484A] font-black text-[13px] transition-colors shadow-sm" title="切換字體大小">
                                        {fontSize === 'normal' ? 'A+' : 'A-'}
                                    </button>
                                    
                                    <button type="button" onClick={handleShare} className="flex items-center gap-1.5 text-[12px] md:text-[13px] font-bold text-[#48484A] bg-gray-100 hover:bg-gray-200 px-3 py-1.5 md:py-2 rounded-full transition-colors duration-300 shadow-sm">
                                        <Icon name="share" size={14} /> <span className="hidden sm:inline">分享此週報</span>
                                    </button>
                                    
                                    <a 
                                        href="https://drive.google.com/drive/u/4/folders/0B2mWI5ZaFxypenUyUG1hbTgxQ2s?resourcekey=0-Mi5SQ1jyzefSJf9sBzOcvw" 
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className={`hidden md:flex items-center justify-center w-9 h-9 rounded-full text-white transition-all duration-300 hover:scale-110 ${themeBgClass} shadow-md`}
                                        title="開啟週報資料夾"
                                    >
                                        <Icon name="download" size={16} />
                                    </a>
                                </div>
                            </div>
                            
                            <div className="flex justify-start items-center">
                                <p className={`${textXs} text-[#6C6C70] font-medium flex items-center gap-2 transition-all duration-300`}>
                                    <span className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full transition-colors duration-300 ${themeBgClass}`}></span>
                                    2026年度異象：{data.vision}
                                </p>
                            </div>
                        </header>

                        <div className="hidden md:flex sticky top-[77px] z-30 bg-white/80 backdrop-blur-md border-b border-gray-200/50 px-6 py-3 shadow-sm justify-center">
                            <div className="flex gap-4 w-full max-w-3xl">
                                {[
                                    { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                    { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                    { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                                ].map(item => {
                                    let activeBg = item.activeBg;

                                        <Icon name="plus" size={18} /> 新人名單
                                    </a>
                                    <a href="https://reurl.cc/0mWG5A" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 ${textSm} font-bold text-[#FF2D55] hover:bg-pink-50 transition-all duration-300 px-3 py-2 rounded-lg`}>
                                        <Icon name="message" size={18} /> 聚會回饋
                                    </a>
                                </div>

                                {isSpecialMonth && (
                                    <div className="relative z-30 flex justify-center mt-6 mb-8">
                                        <button 
                                            type="button" 
                                            onClick={() => setSeasonalEnabled(!seasonalEnabled)}
                                            className={`flex items-center gap-2.5 ${textSm} font-bold px-6 py-3 rounded-full border transition-all duration-300 ${
                                                seasonalEnabled 
                                                    ? `bg-white/80 border-gray-200 text-[#48484A] shadow-sm hover:bg-white` 
                                                    : 'bg-transparent border-gray-300 text-[#8E8E93] hover:bg-white/50'
                                            }`}
                                        >
                                            <span className="text-[18px] leading-none">{currentMonth === 12 ? '❄️' : '🌸'}</span>
                                            {seasonalEnabled ? '關閉節慶特效與色彩' : '開啟節慶特效與色彩'}
                                        </button>
                                    </div>
                                )}

                                <div className="space-y-4 opacity-40 text-center">
                                    <p className={`${textXs} font-bold text-[#1C1C1E] tracking-[0.1em] uppercase px-4 leading-relaxed transition-all duration-300`}>彼此相愛 · 成全聖徒 · 各盡其職 · 完成使命</p>
                                    <p className={`${textMicro} text-[#1C1C1E] font-bold tracking-widest transition-all duration-300`}>© 2026 中華基督教風一族職場教會</p>
                                </div>
                            </footer>
                        </div>

                        <div className="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[448px] px-4 z-50 flex items-center gap-2.5">
                            <div className="flex-1 bg-white/85 backdrop-blur-xl border border-gray-200/60 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.12)] p-1.5 flex gap-1 justify-center">
                                {[
                                    { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                    { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                    { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                                ].map(item => {
                                    let activeBg = item.activeBg;
                                    if (isMay) activeBg = 'bg-[#FF4D85]';
                                    if (isDec) activeBg = 'bg-[#0082CC]';

                                    return (
                                        <button key={item.id} type="button" onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex flex-col items-center justify-center h-[3.5rem] rounded-[1.75rem] transition-all duration-300 active:scale-95 ${
                                            activeMainTab === item.id ? `${activeBg} text-white shadow-md` : 'text-[#8E8E93] hover:bg-gray-100/50'
                                        }`}>
                                            <Icon name={item.icon} size={20} className="mb-0.5" />
                                            <span className="text-[11px] font-bold tracking-wide">{item.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                            
                            <a 
                                href="https://drive.google.com/drive/u/4/folders/0B2mWI5ZaFxypenUyUG1hbTgxQ2s?resourcekey=0-Mi5SQ1jyzefSJf9sBzOcvw" 
                                target="_blank"
                                rel="noopener noreferrer"
                                className={`shrink-0 w-[4.25rem] h-[4.25rem] rounded-full flex items-center justify-center transition-all duration-300 text-white active:scale-95 hover:scale-105 shadow-lg ${
                                    isMay ? 'bg-[#FF4D85] shadow-[#FF4D85]/40' :
                                    isDec ? 'bg-[#0082CC] shadow-[#0082CC]/40' :
                                    activeMainTab === 'worship' ? 'bg-[#007AFF] shadow-[#007AFF]/40' :
                                    activeMainTab === 'news' ? 'bg-[#FF9500] shadow-[#FF9500]/40' :
                                    'bg-[#34C759] shadow-[#34C759]/40'
                                }`}
                            >
                                <Icon name="download" size={24} />
                            </a>
                        </div>

                        {toast && (
                            <div className="fixed bottom-[100px] md:bottom-12 left-1/2 -translate-x-1/2 z-50 toast-enter w-max max-w-[90vw]">
                                <div className="bg-[#2C2C2E] text-white px-6 py-3.5 rounded-full text-[15px] font-bold shadow-2xl flex items-center gap-2 border border-gray-700">
                                    {toast}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
